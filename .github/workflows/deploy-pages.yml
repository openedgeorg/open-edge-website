name: Deploy site to GitHub Pages

# Publishes the static site in ./site to GitHub Pages on every push to main
# that touches it. The site is plain static files (no build step), so we just
# upload the directory as the Pages artifact and deploy it.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# Least-privilege token scopes required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
